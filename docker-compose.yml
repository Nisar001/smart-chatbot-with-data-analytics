services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-chatbot-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/smart_chatbot
      REDIS_URL: redis://redis:6379/0
      FAISS_INDEX_DIR: /app/storage/faiss
      UPLOAD_DIR: /app/storage/uploads
      ENVIRONMENT: docker
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - chatbot_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: smart-chatbot-postgres
    environment:
      POSTGRES_DB: smart_chatbot
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d smart_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smart-chatbot-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: smart-chatbot-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  chatbot_storage:
